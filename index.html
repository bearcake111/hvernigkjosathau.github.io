<!--  greiðirekkiatkvæði er oft kallað að sitja hjá - þingmaðurinn var í þingsalnum og ýtti á takkann greiðir ekki atkvæði  -->
<!--  boðaði fjarvist, þingmaðurinn tilkynnti t.d. veikindi eða var í erindigjörðum á vegum Alþingis  -->
<!--  fjarverandi, þingmaðurinn ýtti ekki á takka og hafði ekki boðað fjarvist  -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="shortcut icon" type="image/png" href="/icon.png" />

    <link
      href="https://fonts.googleapis.com/css?family=Poppins:400,500,600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Hvernig kjósa þau?</title>
  </head>
  <body>
    <!-- TOP NAVIGATION -->
    <nav>
      <p class="pageTitle">Hvernig kjósa þau?</p>
      <img src="islenskiFaninn.png" alt="Logo" class="logo" />
    </nav>

    <main class="app">
      <section id="velja-thingmann" class="hidden"></section>
      <section id="thingmadur-valinn">
        <h1>
          <!-- Thingfolk -->
          <div id="profile-container" class="container">
            <div id="searchbar" class="searchable-container hidden">
              <input
                type="text"
                id="input-nafn"
                class="searchable-dropdown"
                placeholder="Leita..."
              />
              <div id="thingmenn-dropdown" class="searchable-list"></div>
            </div>
            <p class="nafn">Jón Gnarr</p>
            <img
              src="thingmenn-profile.jpg"
              alt="profile"
              class="profile_picture"
            />
          </div>
        </h1>
        <div id="date-searchbar" class="container">
          <div><p>Flokka eftir dagsetningu:</p></div>
          <div class="choose-date">
            <p>Frá</p>
            <input type="date" id="input-date-first" class="date-first" />
          </div>
          <div class="choose-date">
            <p>Til</p>
            <input type="date" id="input-date-second" class="date-second" />
          </div>
          <div class="date-button">
            <p id="error-no-date" class="hidden">
              Vinsamlegast veljið dagsetningu
            </p>
            <p id="error-wrong-order" class="hidden">
              Vinsamlegast veljið upphafsdag á undan lokadegi
            </p>
            <input
              type="button"
              id="search-date-button"
              class="button"
              value="Leita"
            />
          </div>
        </div>
        <div id="malaskra-searchbar" class="container">
          <h3 id="malaskra-searchbar-text">Leita í málaskrá</h3>
          <input
            type="text"
            id="search-malaskra-input"
            placeholder="Leita að máli"
          />
          <input
            type="button"
            id="search-malaskra-button"
            class="button"
            value="Leita"
          />
        </div>
        <div id="efnisflokkar" class="container">
          <div class="yfirflokkur-div">
            <p id="oll-mal" class="yfirflokkur-txt">Öll mál</p>
          </div>
        </div>
        <div id="years" aria-hidden="true">
          <span class="year">Já</span>
          <span class="year">Nei</span>
          <span class="year">Greiddi ekki atkvæði</span>
          <span class="year">Fjarvist</span>
          <span class="year">Fjarverandi</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>
                  <div id="dags-container" class="dags-container">
                    <div id="filter-arrow" class="arrow-up"></div>
                    <h2 id="label-dags">Dagsetning</h2>
                  </div>
                </th>
                <th><h2>Mál</h2></th>
              </tr>
            </thead>
            <tbody class="mal-container">
              <tr class="mal odd">
                <th class="mal-heading">Mál 1</th>
                <td><div class="vote já"></div></td>
                <td><div class="vote nei"></div></td>
                <td><div class="vote greiðir-ekki-atkvæði"></div></td>
                <td><div class="vote boðaði-fjarvist"></div></td>
                <td><div class="vote fjarverandi"></div></td>
              </tr>
              <tr class="mal even">
                <th>Mál 2</th>
                <td><div class="vote já"></div></td>
                <td><div class="vote nei"></div></td>
                <td><div class="vote greiðir-ekki-atkvæði"></div></td>
                <td><div class="vote boðaði-fjarvist"></div></td>
                <td><div class="vote fjarverandi"></div></td>
              </tr>
              <tr class="mal odd">
                <th>Mál 3</th>
                <td><div class="vote já"></div></td>
                <td><div class="vote nei"></div></td>
                <td><div class="vote greiðir-ekki-atkvæði"></div></td>
                <td><div class="vote boðaði-fjarvist"></div></td>
                <td><div class="vote fjarverandi"></div></td>
              </tr>
              <tr class="total">
                <th>Total</th>
                <td><span>X</span></td>
                <td><span>X</span></td>
                <td><span>X</span></td>
                <td><span>X</span></td>
                <td><span>X</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
